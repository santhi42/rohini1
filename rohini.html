<!DOCTYPE html>
<html>
<head>
    <title>Insurance Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #004080;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }

        .module {
            background: white;
            border: 2px solid #004080;
            border-radius: 10px;
            width: 250px;
            padding: 20px;
            text-align: center;
            box-shadow: 2px 2px 10px gray;
        }

        .module h2 {
            color: #004080;
        }

        button {
            background-color: #004080;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0066cc;
        }

        #output {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border: 1px solid #004080;
            border-radius: 10px;
            min-height: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #004080;
        }

        th {
            background-color: #004080;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Insurance Management System</h1>
</header>

<div class="container">

    <!-- Policies Module -->
    <div class="module">
        <h2>Policies</h2>
        <p>View available insurance policies.</p>
        <button onclick="showPolicies()">Show Policies</button>
    </div>

    <!-- Claims Module -->
    <div class="module">
        <h2>Claims</h2>
        <p>View claim status details.</p>
        <button onclick="showClaims()">Show Claims</button>
    </div>

    <!-- Payments Module -->
    <div class="module">
        <h2>Payments</h2>
        <p>View premium payment records.</p>
        <button onclick="showPayments()">Show Payments</button>
    </div>

</div>

<div id="output">
    <h3>Insurance Information Display Area</h3>
</div>

<script>
    function showPolicies() {
        document.getElementById("output").innerHTML =
        `<h3>Policy Details</h3>
        <table>
            <tr>
                <th>Policy ID</th>
                <th>Policy Type</th>
                <th>Coverage Amount</th>
            </tr>
            <tr>
                <td>P101</td>
                <td>Life Insurance</td>
                <td>₹10,00,000</td>
            </tr>
            <tr>
                <td>P102</td>
                <td>Health Insurance</td>
                <td>₹5,00,000</td>
            </tr>
            <tr>
                <td>P103</td>
                <td>Vehicle Insurance</td>
                <td>₹3,00,000</td>
            </tr>
        </table>`;
    }

    function showClaims() {
        document.getElementById("output").innerHTML =
        `<h3>Claim Details</h3>
        <table>
            <tr>
                <th>Claim ID</th>
                <th>Policy ID</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>C201</td>
                <td>P101</td>
                <td>Approved</td>
            </tr>
            <tr>
                <td>C202</td>
                <td>P102</td>
                <td>Pending</td>
            </tr>
            <tr>
                <td>C203</td>
                <td>P103</td>
                <td>Rejected</td>
            </tr>
        </table>`;
    }

    function showPayments() {
        document.getElementById("output").innerHTML =
        `<h3>Payment Records</h3>
        <table>
            <tr>
                <th>Payment ID</th>
                <th>Policy ID</th>
                <th>Amount</th>
            </tr>
            <tr>
                <td>PAY301</td>
                <td>P101</td>
                <td>₹15,000</td>
            </tr>
            <tr>
                <td>PAY302</td>
                <td>P102</td>
                <td>₹8,000</td>
            </tr>
            <tr>
                <td>PAY303</td>
                <td>P103</td>
                <td>₹5,000</td>
            </tr>
        </table>`;
    }
</script>

</body>
</html>
